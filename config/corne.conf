# ========================================
# FileName: corne.conf
# ... (mantener todo el encabezado de Marcos Chow)
# =========================================

### Keyboard name
CONFIG_ZMK_KEYBOARD_NAME="Corne Estrada"
## PERMITIR CONTROL DE RATO
CONFIG_ZMK_POINTING=y
### Boost Bluetooth TX power, also make Bluetooth stronger
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

### POWER OPTIONS
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_EXT_POWER=y
# 15 min (15*60*1000ms) para sueño profundo
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=7200000

### ZMK STUDIO
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

### RGB UNDERGLOW
# Aquí quitamos los '#' para activar las funciones
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Brillo inicial al 15% para proteger la batería
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=15
CONFIG_ZMK_RGB_UNDERGLOW_BRT_STEP=5
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# Color inicial Azul (240). Si quieres verde, cambia a 120.
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=240
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100

# Evita que el OLED se apague al apagar el RGB
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

### OLED DISPLAY
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

### HID para nice!view ePaperDisplay
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y
